version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: wind-postgres
    environment:
      POSTGRES_DB: wind_inspection
      POSTGRES_USER: wind
      POSTGRES_PASSWORD: wind123456
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wind -d wind_inspection"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wind-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: wind-redis
    command: redis-server --requirepass redis123456 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wind-net

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: wind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wind-net

  # Nacos 注册中心和配置中心
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: wind-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "SecretKey012345678901234567890123456789012345678901234567890123456789"
      NACOS_AUTH_IDENTITY_KEY: "nacos"
      NACOS_AUTH_IDENTITY_VALUE: "nacos"
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - wind-net

  # AI 推理服务 (FastAPI)
  ai-service:
    build:
      context: ../services/ai
      dockerfile: Dockerfile
    container_name: wind-ai-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis123456
      AI_SERVICE_PORT: 8090
    ports:
      - "8090:8090"
    volumes:
      - ../services/ai/weights:/app/weights
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - wind-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  wind-net:
    driver: bridge
